apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: pdooh-rtb-supply
  title: pDOOH RTB Supply (DSP-Mediated)
  description: >-
    Programmatic Digital-Out-of-Home buying against Clear Channel Outdoor
    inventory through DSP partner integrations using OpenRTB 2.6 with the
    DOOH object extension. CCO does not expose RTB endpoints publicly; buyers
    transact via DSPs that connect to CCO/SSP partners. This capability
    documents the OpenRTB DOOH bid-request shape and venue taxonomy expected.
externalProtocol:
  name: OpenRTB 2.6 DOOH
  specification: https://github.com/InteractiveAdvertisingBureau/openrtb2.x/blob/main/2.6.md
  schema: ../json-schema/clear-channel-outdoor-openrtb-dooh-schema.json
  taxonomy:
    name: OpenOOH Venue Taxonomy
    venuetypetax: 1
dspPartners:
  - Adelphic
  - Adform
  - Adomni
  - AdQuick
  - Campsite
  - Displayce
  - Google DV360
  - Hivestack
  - Nexxen
  - OneView
  - OutMoove
  - Pulsepoint
  - Quotient
  - Simplifi
  - Sito
  - StackAdapt
  - The Trade Desk
  - Vistar Media
  - Xandr
  - Yahoo
  - Zeta
audienceData:
  name: RADAR
  description: Clear Channel Outdoor's first-party audience and attribution data suite based on aggregated mobile location data.
  url: https://clearchanneloutdoor.com/radar-data-solutions/
