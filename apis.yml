apis:
  - aid: clear-channel-outdoor:clear-channel-outdoor-direct
    name: Clear Channel Outdoor Automated Direct API
    description: >-
      REST API for the CCO.IO Automated Direct platform at direct.cco.io. Supports search, retrieval and management of
      displays, networks, markets, products, orders, bookings, campaigns, creatives, photos, customers, accounts,
      contracts, quotes, renewals, restrictions and IAB / OpenOOH taxonomies. Uses OAuth 2.0 client credentials
      (tokenUrl https://direct.cco.io/v2/token) with scoped access tokens. The OpenAPI documented here is derived from
      the open-source Go SDK at github.com/ClearChannelOutdoor/io-sdk-golang and from the developer portal at
      developer.cco.io.
    humanURL: https://developer.cco.io
    baseURL: https://direct.cco.io
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Programmatic Direct
      - DOOH
      - OOH
      - REST
      - OAuth2
    properties:
      - type: Documentation
        url: https://developer.cco.io
      - type: OpenAPI
        url: openapi/clear-channel-outdoor-direct-openapi.yml
      - type: SDKs
        url: https://github.com/ClearChannelOutdoor/io-sdk-golang
      - type: Authentication
        url: https://direct.cco.io/v2/token
      - type: Spectral
        url: rules/clear-channel-outdoor-direct-rules.yml
  - aid: clear-channel-outdoor:pdooh-rtb-supply
    name: Clear Channel Outdoor pDOOH RTB Supply
    description: >-
      Programmatic digital out-of-home (pDOOH) supply made available through 20+ DSP partners that transact CCO
      inventory via OpenRTB 2.6 with the DOOH object extension (with imp.qty support and the OpenOOH venue taxonomy
      where venuetypetax=1). This is not a CCO- hosted REST API — it is a supply-chain contract that buyers access
      through DSPs/SSPs (Vistar Media, Hivestack, The Trade Desk, Google DV360, etc.). Documented here so the contract,
      partners and schemas are first-class artifacts in the network.
    humanURL: https://clearchanneloutdoor.com/programmatic-advertising/
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - pDOOH
      - OpenRTB
      - DSP
      - SSP
      - RTB
    properties:
      - type: Documentation
        url: https://clearchanneloutdoor.com/programmatic-advertising/
      - type: Standards
        url: https://github.com/InteractiveAdvertisingBureau/openrtb2.x
      - type: JSONSchema
        url: json-schema/clear-channel-outdoor-openrtb-dooh-schema.json
      - type: JSONSchema
        url: json-schema/clear-channel-outdoor-dsp-integration-schema.json
      - type: Examples
        url: examples/clear-channel-outdoor-openrtb-dooh-bid-request-example.json
  - aid: clear-channel-outdoor:radar
    name: Clear Channel Outdoor RADAR Data Suite
    description: >-
      RADAR is CCO's first-party audience-planning, attribution and measurement suite built on aggregated and/or
      anonymous mobile location data licensed from business partners. The suite includes RADARView (planning),
      RADARProof (attribution), RADARConnect (audience activation), RADARSync (data sync), and Inflight Insights —
      described as "the first in-house measurement solution offered by an OOH media owner to deliver visitation
      analytics during a campaign flight." RADAR is delivered as a managed data/services offering; there is no public
      self-serve API. Documented here so the product family, scope and data semantics are catalogued in the network.
    humanURL: https://clearchanneloutdoor.com/radar-data-solutions/
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Audience Data
      - Attribution
      - Location Data
      - Measurement
      - Planning
    properties:
      - type: Documentation
        url: https://clearchanneloutdoor.com/radar-data-solutions/
      - type: Privacy
        url: https://clearchanneloutdoor.com/privacy-policy/
