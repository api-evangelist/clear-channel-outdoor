description: >-
  Clear Channel Outdoor (NYSE: CCO) is one of the largest out-of-home (OOH) advertising companies in the world,
  operating billboards, street furniture, transit, airport, and digital out-of-home (DOOH) displays across 65+ U.S.
  markets and 55+ commercial airports, reaching "130 million Americans weekly." The CCO developer surface spans three
  layers: the CCO.IO Automated Direct REST API at direct.cco.io for programmatic-direct buying of inventory (OAuth 2.0
  client credentials, open-source Go SDK at github.com/ClearChannelOutdoor/io-sdk-golang), programmatic digital
  out-of-home (pDOOH) buying through 20+ DSP partners using OpenRTB 2.6 with the DOOH object extension, and RADAR —
  CCO's first-party audience and attribution data suite (RADARView, RADARProof, RADARConnect, RADARSync, Inflight
  Insights) built on aggregated and anonymous mobile location data. CCO maintains a public fork of the IAB Tech Lab
  OpenDirect-OOH specification at github.com/ClearChannelOutdoor/ooh_open_direct.
